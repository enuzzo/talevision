<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TaleVision{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='scrybar.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header class="tv-topbar">
    <div class="tv-topbar__brand">
      <span class="tv-topbar__logo">⬛</span>
      <span class="tv-topbar__name">TaleVision</span>
    </div>
    <div class="tv-topbar__status">
      <span id="topbar-clock" class="tv-topbar__clock">--:--</span>
      <span id="topbar-mode" class="tv-mode-pill">—</span>
    </div>
  </header>

  <main class="tv-main">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
